services:
  # Full-stack Laravel + React application
  - type: web
    name: dentala-fullstack
    env: docker
    repo: https://github.com/chellesalucop/dentala.git
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://dentala-ndex.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: dentala-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dentala-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: dentala-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: dentala-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dentala-db
          property: password
      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: a79f53001@smtp-brevo.com
      - key: MAIL_PASSWORD
        sync: false  # Set this in Render Dashboard → Environment (GitHub blocks secrets in code)
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: mrasalucop01@tip.edu.ph
      - key: MAIL_FROM_NAME
        value: "Dentala Clinic"

# Background queue worker for email processing
  - type: worker
    name: dentala-queue-worker
    env: docker
    repo: https://github.com/chellesalucop/dentala.git
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://dentala-ndex.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: dentala-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dentala-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: dentala-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: dentala-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dentala-db
          property: password
      - key: CACHE_DRIVER
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: a79f53001@smtp-brevo.com
      - key: MAIL_PASSWORD
        sync: false  
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: mrasalucop01@tip.edu.ph
      - key: MAIL_FROM_NAME
        value: "Dentala Clinic"
      - key: SERVICE_TYPE
        value: worker
    startCommand: php artisan queue:work --sleep=3 --tries=3 --max-time=300

databases:
  - name: dentala-db
    databaseName: dentala_db
    user: dentala_db_user
    plan: free
    region: oregon
